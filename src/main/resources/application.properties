spring.application.name=song.course
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=12345678
spring.data.neo4j.database = song-track-db
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/song-course
spring.graphql.cors.allowed-origins=*
logging.level.org.springframework.data.neo4j=DEBUG
server.port = 9081

# Global Kafka cluster address
spring.kafka.bootstrap-servers=localhost:9092

# Producer specific serializers
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Optional identification string for broker logging
spring.kafka.producer.client-id=test-topic

